service:
  extensions: [healthcheckv2, zpages, jaeger_storage, jaeger_query]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [jaeger_storage_exporter]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]

extensions:
  healthcheckv2:
    endpoint: 0.0.0.0:13133
  zpages:
    endpoint: 0.0.0.0:55679
  jaeger_storage:
    backends:
      in_memory:
        memory:
          max_traces: 100000
  jaeger_query:
    storage:
      traces: in_memory

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  jaeger_storage_exporter:
    trace_storage: in_memory
  debug:
    verbosity: basic
