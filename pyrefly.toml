python-interpreter-path = ".venv/bin/python"
site-package-path = [".venv/lib/python3.11/site-packages"]

search-path = [
  "."
]

project-includes = [
  "*.py",
  "etl/**/*.py",
  "backend/**/*.py",
  "shared/**/*.py",
  "model_orchestrator/**/*.py",
]

project-excludes = [
  ".git/**",
  ".venv/**",
  "__pycache__/**",
  "postgres_data/**",
  "storage/**",
  "frontend/**",
  "node_modules/**",
]